<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="logo">Job<span>Portal</span></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your account</p>

      <div id="alertBox" class="alert d-none" role="alert" aria-live="polite"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email address</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>

        <div class="mb-2">
          <div class="login-meta">
            <label class="form-label fw-semibold mb-0" for="password">Password</label>
            <a href="#" id="forgotPasswordLink">Forgot password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePwd" aria-label="Show password">
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" class="form-check-input" id="rememberMe" />
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          Sign In
        </button>
      </form>

      <hr class="my-4" />
      <div>
        <p class="mb-2 text-muted small text-center">Quick demo access</p>
        <div class="demo-actions">
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="fillDemo('admin@jobportal.com','password')">Continue as Admin</button>
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="fillDemo('employer@techcorp.com','password')">Continue as Employer</button>
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="fillDemo('student@rp.edu.sg','password')">Continue as Student</button>
        </div>
      </div>
      <p class="text-center mt-3 mb-0">
        Don't have an account? <a href="/register.html" class="text-primary fw-semibold">Sign up</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  if (api.isLoggedIn()) {
    const u = api.getUser();
    if (u && u.role === 'admin') window.location.href = '/admin.html';
    else if (u && u.role === 'employer') window.location.href = '/employer.html';
    else window.location.href = '/index.html';
  }

  const remembered = localStorage.getItem('jp_remember_email');
  if (remembered) {
    document.getElementById('email').value = remembered;
    document.getElementById('rememberMe').checked = true;
  }

  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const btn = document.getElementById('togglePwd');
    const icon = btn.querySelector('i');
    const showing = pwd.type === 'text';
    pwd.type = showing ? 'password' : 'text';
    icon.className = showing ? 'bi bi-eye' : 'bi bi-eye-slash';
    btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });

  document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
    e.preventDefault();
    showAlert('Password resets are handled by an administrator. Please contact support.', 'info');
  });

  function fillDemo(email, password) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
    document.getElementById('email').focus();
  }

  function showAlert(msg, type = 'danger') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.classList.remove('d-none');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) {
      showAlert('Please fill in all fields.');
      return;
    }

    btn.disabled = true;
    btn.setAttribute('aria-busy', 'true');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing in...';

    try {
      const data = await api.login(email, password);
      if (remember) localStorage.setItem('jp_remember_email', email);
      else localStorage.removeItem('jp_remember_email');

      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        if (data.user.role === 'admin') window.location.href = '/admin.html';
        else if (data.user.role === 'employer') window.location.href = '/employer.html';
        else window.location.href = '/index.html';
      }, 800);
    } catch (err) {
      showAlert(err.message || 'Login failed. Please try again.');
      btn.disabled = false;
      btn.removeAttribute('aria-busy');
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
