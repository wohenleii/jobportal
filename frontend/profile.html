<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Job<span>Portal</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/jobs.html">Browse Jobs</a></li>
        <li class="nav-item nav-student-only"><a class="nav-link" href="/profile.html" onclick="localStorage.setItem('profileTab','applications')">My Applications</a></li>
        <li class="nav-item nav-student-only"><a class="nav-link" href="/profile.html#bookmarks" onclick="localStorage.setItem('profileTab','bookmarks')">Saved Jobs</a></li>
      </ul>
      <ul class="navbar-nav align-items-center" id="navAuth"></ul>
    </div>
  </div>
</nav>

<!-- Profile Header -->
<div class="profile-header">
  <div class="container">
    <div class="d-flex align-items-center gap-4">
      <div class="profile-avatar" id="avatarEl">?</div>
      <div>
        <h2 class="fw-bold mb-1" id="profileName">Loading...</h2>
        <div class="opacity-75" id="profileEmail"></div>
        <span class="badge bg-white text-dark border mt-1" id="profileRole"></span>
      </div>
    </div>
  </div>
</div>

<div class="container pt-3">
  <div id="profileCompleteBanner" class="alert alert-warning d-none mb-0" role="status"></div>
</div>

<div class="container py-4">
  <div class="row g-4">

    <!-- Left: Edit Profile -->
    <div class="col-lg-4">
      <div class="profile-card">
        <h5 class="fw-bold mb-3">Edit Profile</h5>
        <div id="profileAlert" class="alert d-none"></div>
        <form id="profileForm">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Full Name</label>
            <input type="text" class="form-control" id="editName" />
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Bio <span class="text-danger">*</span></label>
            <textarea class="form-control" id="editBio" rows="3" placeholder="Tell employers about yourself..." required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Skills <span class="text-muted">(comma-separated)</span> <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="editSkills" placeholder="React, Node.js, Python..." required />
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Resume URL <span class="text-danger">*</span></label>
            <input type="url" class="form-control" id="editResume" placeholder="https://..." required />
            <div class="form-text">Add a public link to your resume (Google Drive, LinkedIn, personal site, etc.).</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Save Changes</button>
        </form>
      </div>
    </div>

    <!-- Right: Tabs -->
    <div class="col-lg-8">
      <ul class="nav nav-tabs mb-4" id="profileTabs">
        <li class="nav-item"><button class="nav-link active" onclick="showTab('applications', this)">My Applications</button></li>
        <li class="nav-item"><button class="nav-link" onclick="showTab('bookmarks', this)">Bookmarked Jobs</button></li>
      </ul>

      <!-- Applications Tab -->
      <div id="tab-applications">
        <div id="applicationsList">
          <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
        </div>
      </div>

      <!-- Bookmarks Tab -->
      <div id="tab-bookmarks" class="d-none">
        <div id="bookmarksList">
          <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Job Details Modal -->
<div class="modal fade" id="jobDetailsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-briefcase me-2 text-primary"></i>Job Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="jobDetailsBody">
        <div class="text-center py-4"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading</span></div></div>
      </div>
      <div class="modal-footer">
        <a href="/jobs.html" class="btn btn-outline-primary me-auto">Browse more jobs</a>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  // Require login
  if (!api.isLoggedIn()) window.location.href = '/login.html';
  updateNavAuth();

  const jobDetailsModal = new bootstrap.Modal(document.getElementById('jobDetailsModal'));

  // Tab deep-link from homepage / nav
  const profileTab = localStorage.getItem('profileTab');
  if (profileTab === 'bookmarks' || profileTab === 'applications') {
    localStorage.removeItem('profileTab');
    window.addEventListener('load', () => {
      if (profileTab === 'bookmarks') {
        const btn = [...document.querySelectorAll('#profileTabs .nav-link')].find(b => b.textContent.includes('Bookmark'));
        if (btn) btn.click();
      }
    });
  }

  const statusColors = {
    pending: 'warning', reviewed: 'info', shortlisted: 'primary',
    rejected: 'danger', hired: 'success'
  };

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatJobTypeLabel(type) {
    const map = {
      'full-time': 'Full-time',
      'part-time': 'Part-time',
      'short-term': 'Short-term',
      contract: 'Contract',
      remote: 'Remote',
    };
    return map[type] || (type || '—');
  }

  async function openJobDetails(jobId, options = {}) {
    const body = document.getElementById('jobDetailsBody');
    body.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading</span></div></div>';
    jobDetailsModal.show();

    try {
      const { job } = await api.getJob(jobId);
      const alreadyApplied = !!options.alreadyApplied;
      const appStatus = options.appStatus || '';
      const initials = companyInitials(job.company_name);
      const salaryText = (job.salary_min || job.salary_max)
        ? formatSalary(job.salary_min, job.salary_max)
        : 'Not specified';

      body.innerHTML = `
        <div class="d-flex align-items-start gap-3 mb-4">
          <div class="company-logo-placeholder" aria-hidden="true">${esc(initials)}</div>
          <div>
            <h4 class="fw-bold mb-1">${esc(job.title)}</h4>
            <div class="text-muted">${esc(job.company_name || '')}</div>
            <div class="d-flex flex-wrap gap-2 mt-2">
              <span class="badge-type ${badgeClass(job.job_type)}">${esc(formatJobTypeLabel(job.job_type))}</span>
              ${job.location ? `<span class="badge bg-light text-secondary"><i class="bi bi-geo-alt" aria-hidden="true"></i> ${esc(job.location)}</span>` : ''}
              ${job.category ? `<span class="badge bg-light text-secondary">${esc(job.category)}</span>` : ''}
              ${alreadyApplied ? `<span class="badge bg-success">Applied${appStatus ? ` · ${esc(appStatus)}` : ''}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="row g-3 mb-4">
          <div class="col-sm-6">
            <div class="p-3 bg-light rounded-3">
              <div class="small text-muted">Salary</div>
              <div class="fw-semibold">${esc(salaryText)}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="p-3 bg-light rounded-3">
              <div class="small text-muted">Deadline</div>
              <div class="fw-semibold">${job.deadline ? new Date(job.deadline).toLocaleDateString() : 'Open'}</div>
            </div>
          </div>
        </div>
        <h6 class="fw-bold">Job Description</h6>
        <p class="text-muted text-preline">${esc(job.description || 'No description available.')}</p>
        ${job.requirements
          ? `<h6 class="fw-bold mt-3">Requirements</h6><p class="text-muted text-preline">${esc(job.requirements)}</p>`
          : ''}
        <h6 class="fw-bold mt-3">About ${esc(job.company_name || 'the company')}</h6>
        <p class="text-muted">${esc(job.company_description || 'No company overview available.')}</p>
        <div class="d-flex flex-wrap gap-2 mt-4">
          ${alreadyApplied
            ? '<span class="badge-applied"><i class="bi bi-check2 me-1" aria-hidden="true"></i>Already applied</span>'
            : `<a href="/jobs.html?id=${job.id}" class="btn btn-primary">View &amp; Apply</a>`}
          <a href="/jobs.html?id=${job.id}" class="btn btn-outline-primary">Open on Browse Jobs</a>
        </div>
      `;
    } catch (err) {
      body.innerHTML = `<div class="alert alert-danger mb-0">${esc(err.message || 'Failed to load job details.')}</div>`;
    }
  }

  async function loadProfile() {
    try {
      const data = await api.getMe();
      const user = data.user;
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      document.getElementById('avatarEl').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('editName').value = user.name || '';
      document.getElementById('editBio').value = user.bio || '';
      document.getElementById('editSkills').value = user.skills || '';
      document.getElementById('editResume').value = user.resume_url || '';
      renderProfileCompleteBanner(user);
    } catch (err) {
      showToast('Failed to load profile', 'danger');
    }
  }

  function renderProfileCompleteBanner(user) {
    const banner = document.getElementById('profileCompleteBanner');
    if (!banner || user.role !== 'student') {
      if (banner) banner.className = 'alert alert-warning d-none mb-0';
      return;
    }
    if (isStudentProfileComplete(user)) {
      banner.className = 'alert alert-success mb-0';
      banner.innerHTML = `
        <div class="d-flex align-items-start gap-2">
          <i class="bi bi-check-circle-fill mt-1" aria-hidden="true"></i>
          <div>
            <strong>Profile ready for applications</strong>
            <div class="small mt-1">Employers can see your bio, skills, and resume when you apply.</div>
          </div>
        </div>`;
      return;
    }
    const missing = studentProfileMissingFields(user).join(', ');
    banner.className = 'alert alert-warning mb-0';
    banner.innerHTML = `
      <div class="d-flex align-items-start gap-2">
        <i class="bi bi-exclamation-triangle-fill mt-1" aria-hidden="true"></i>
        <div>
          <strong>Complete your student profile</strong>
          <div class="mt-1">Fill in your bio, skills, and resume URL before applying so employers can review your details.</div>
          <div class="small mt-1">Still missing: ${esc(missing)}</div>
        </div>
      </div>`;
    if (new URLSearchParams(window.location.search).get('complete') === '1') {
      document.getElementById('editBio')?.focus();
      showToast('Complete your profile to apply for jobs.', 'warning');
    }
  }

  async function loadApplications() {
    try {
      const data = await api.getMyApplications();
      const container = document.getElementById('applicationsList');
      if (!data.applications.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon" aria-hidden="true"><i class="bi bi-file-earmark-text"></i></div>
            <h6>You have not applied to any jobs yet.</h6>
            <p>Explore opportunities and submit your first application.</p>
            <a href="/jobs.html" class="btn btn-primary">Browse Jobs</a>
          </div>`;
        return;
      }
      container.innerHTML = data.applications.map(app => `
        <article class="job-card mb-3 profile-job-card" role="button" tabindex="0"
          onclick="openJobDetails(${app.job_id}, { alreadyApplied: true, appStatus: '${esc(app.status)}' })"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openJobDetails(${app.job_id},{alreadyApplied:true,appStatus:'${esc(app.status)}'});}">
          <div class="d-flex justify-content-between align-items-start gap-3">
            <div>
              <a href="#" class="job-title d-block" onclick="event.preventDefault(); openJobDetails(${app.job_id}, { alreadyApplied: true, appStatus: '${esc(app.status)}' });">${esc(app.title)}</a>
              <div class="text-muted small">${esc(app.company_name)} · ${esc(app.location || '')}</div>
              <div class="mt-1">
                <span class="badge-type ${badgeClass(app.job_type)}">${esc(formatJobTypeLabel(app.job_type))}</span>
              </div>
            </div>
            <div class="text-end">
              <span class="badge bg-${statusColors[app.status] || 'secondary'}">${esc(app.status)}</span>
              <div class="text-muted small mt-1">${timeAgo(app.applied_at)}</div>
            </div>
          </div>
        </article>
      `).join('');
    } catch (err) {
      document.getElementById('applicationsList').innerHTML =
        '<div class="alert alert-danger">Failed to load applications.</div>';
    }
  }

  async function loadBookmarks() {
    try {
      const data = await api.getBookmarks();
      const container = document.getElementById('bookmarksList');
      if (!data.bookmarks.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon" aria-hidden="true"><i class="bi bi-bookmark"></i></div>
            <h6>You have not saved any jobs yet.</h6>
            <p>Bookmark jobs while browsing to revisit them later.</p>
            <a href="/jobs.html" class="btn btn-primary">Browse Jobs</a>
          </div>`;
        return;
      }
      container.innerHTML = data.bookmarks.map(job => `
        <article class="job-card mb-3 profile-job-card" role="button" tabindex="0"
          onclick="openJobDetails(${job.id})"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openJobDetails(${job.id});}">
          <div class="d-flex justify-content-between align-items-start gap-3">
            <div>
              <a href="#" class="job-title d-block" onclick="event.preventDefault(); openJobDetails(${job.id});">${esc(job.title)}</a>
              <div class="company-name">${esc(job.company_name)} · <i class="bi bi-geo-alt" aria-hidden="true"></i> ${esc(job.location || '')}</div>
              <div class="mt-2 d-flex gap-2 flex-wrap">
                <span class="badge-type ${badgeClass(job.job_type)}">${esc(formatJobTypeLabel(job.job_type))}</span>
                ${(job.salary_min || job.salary_max) ? `<span class="text-muted small">${esc(formatSalary(job.salary_min, job.salary_max))}</span>` : ''}
              </div>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger" aria-label="Remove saved job"
              onclick="event.stopPropagation(); removeBookmark(${job.id}, this)">
              <i class="bi bi-trash" aria-hidden="true"></i>
            </button>
          </div>
        </article>
      `).join('');
    } catch (err) {
      document.getElementById('bookmarksList').innerHTML =
        '<div class="alert alert-danger">Failed to load bookmarks.</div>';
    }
  }

  async function removeBookmark(jobId, btn) {
    try {
      await api.removeBookmark(jobId);
      btn.closest('.job-card').remove();
      showToast('Bookmark removed', 'info');
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  function showTab(tab, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('d-none'));
    document.getElementById(`tab-${tab}`).classList.remove('d-none');
    document.querySelectorAll('#profileTabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('profileAlert');
    const name = document.getElementById('editName').value.trim();
    const bio = document.getElementById('editBio').value.trim();
    const skills = document.getElementById('editSkills').value.trim();
    const resume_url = document.getElementById('editResume').value.trim();

    if (!name || !bio || !skills || !resume_url) {
      alertEl.className = 'alert alert-warning';
      alertEl.textContent = 'Please fill in name, bio, skills, and resume URL so employers can see your details.';
      alertEl.classList.remove('d-none');
      return;
    }

    try {
      await api.updateProfile({ name, bio, skills, resume_url });
      // Keep local auth name in sync for nav
      const localUser = api.getUser();
      if (localUser) {
        localUser.name = name;
        api.saveAuth(api.getToken(), localUser);
        updateNavAuth();
      }
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Profile updated successfully! You can now apply for jobs.';
      alertEl.classList.remove('d-none');
      loadProfile();
      setTimeout(() => alertEl.classList.add('d-none'), 3000);
    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.message;
      alertEl.classList.remove('d-none');
    }
  });

  loadProfile();
  loadApplications();
  loadBookmarks();
</script>
</body>
</html>
