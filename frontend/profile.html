<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Job<span>Portal</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/jobs.html">Browse Jobs</a></li>
      </ul>
      <ul class="navbar-nav align-items-center" id="navAuth"></ul>
    </div>
  </div>
</nav>

<!-- Profile Header -->
<div class="profile-header">
  <div class="container">
    <div class="d-flex align-items-center gap-4">
      <div class="profile-avatar" id="avatarEl">?</div>
      <div>
        <h2 class="fw-bold mb-1" id="profileName">Loading...</h2>
        <div class="opacity-75" id="profileEmail"></div>
        <span class="badge bg-white text-primary mt-1" id="profileRole"></span>
      </div>
    </div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">

    <!-- Left: Edit Profile -->
    <div class="col-lg-4">
      <div class="profile-card">
        <h5 class="fw-bold mb-3">Edit Profile</h5>
        <div id="profileAlert" class="alert d-none"></div>
        <form id="profileForm">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Full Name</label>
            <input type="text" class="form-control" id="editName" />
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Bio</label>
            <textarea class="form-control" id="editBio" rows="3" placeholder="Tell employers about yourself..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Skills <span class="text-muted">(comma-separated)</span></label>
            <input type="text" class="form-control" id="editSkills" placeholder="React, Node.js, Python..." />
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Resume URL</label>
            <input type="url" class="form-control" id="editResume" placeholder="https://..." />
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Save Changes</button>
        </form>
      </div>
    </div>

    <!-- Right: Tabs -->
    <div class="col-lg-8">
      <ul class="nav nav-tabs mb-4" id="profileTabs">
        <li class="nav-item"><button class="nav-link active" onclick="showTab('applications', this)">My Applications</button></li>
        <li class="nav-item"><button class="nav-link" onclick="showTab('bookmarks', this)">Bookmarked Jobs</button></li>
      </ul>

      <!-- Applications Tab -->
      <div id="tab-applications">
        <div id="applicationsList">
          <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
        </div>
      </div>

      <!-- Bookmarks Tab -->
      <div id="tab-bookmarks" class="d-none">
        <div id="bookmarksList">
          <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  // Require login
  if (!api.isLoggedIn()) window.location.href = '/login.html';
  updateNavAuth();

  // Check if redirected to bookmarks tab
  if (localStorage.getItem('profileTab') === 'bookmarks') {
    localStorage.removeItem('profileTab');
    document.addEventListener('DOMContentLoaded', () => {});
    // Switch to bookmarks tab after load
    window.addEventListener('load', () => {
      const btn = document.querySelector('#profileTabs .nav-link:nth-child(2)') ||
                  [...document.querySelectorAll('#profileTabs .nav-link')].find(b => b.textContent.includes('Bookmark'));
      if (btn) btn.click();
    });
  }

  const statusColors = {
    pending: 'warning', reviewed: 'info', shortlisted: 'primary',
    rejected: 'danger', hired: 'success'
  };

  async function loadProfile() {
    try {
      const data = await api.getMe();
      const user = data.user;
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      document.getElementById('avatarEl').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('editName').value = user.name || '';
      document.getElementById('editBio').value = user.bio || '';
      document.getElementById('editSkills').value = user.skills || '';
      document.getElementById('editResume').value = user.resume_url || '';
    } catch (err) {
      showToast('Failed to load profile', 'danger');
    }
  }

  async function loadApplications() {
    try {
      const data = await api.getMyApplications();
      const container = document.getElementById('applicationsList');
      if (!data.applications.length) {
        container.innerHTML = `
          <div class="text-center py-5">
            <div style="font-size:3rem">📋</div>
            <h6 class="mt-2">No applications yet</h6>
            <a href="/jobs.html" class="btn btn-primary mt-2">Browse Jobs</a>
          </div>`;
        return;
      }
      container.innerHTML = data.applications.map(app => `
        <div class="job-card mb-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="fw-bold">${app.title}</div>
              <div class="text-muted small">${app.company_name} · ${app.location}</div>
              <div class="mt-1">
                <span class="badge-type ${badgeClass(app.job_type)}">${app.job_type}</span>
              </div>
            </div>
            <div class="text-end">
              <span class="badge bg-${statusColors[app.status] || 'secondary'}">${app.status}</span>
              <div class="text-muted small mt-1">${timeAgo(app.applied_at)}</div>
            </div>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('applicationsList').innerHTML =
        '<div class="alert alert-danger">Failed to load applications.</div>';
    }
  }

  async function loadBookmarks() {
    try {
      const data = await api.getBookmarks();
      const container = document.getElementById('bookmarksList');
      if (!data.bookmarks.length) {
        container.innerHTML = `
          <div class="text-center py-5">
            <div style="font-size:3rem">🔖</div>
            <h6 class="mt-2">No bookmarks yet</h6>
            <a href="/jobs.html" class="btn btn-primary mt-2">Browse Jobs</a>
          </div>`;
        return;
      }
      container.innerHTML = data.bookmarks.map(job => `
        <div class="job-card mb-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <a href="/jobs.html?id=${job.id}" class="job-title">${job.title}</a>
              <div class="company-name">${job.company_name} · <i class="bi bi-geo-alt"></i> ${job.location}</div>
              <div class="mt-2 d-flex gap-2">
                <span class="badge-type ${badgeClass(job.job_type)}">${job.job_type}</span>
                <span class="text-success small fw-semibold">${formatSalary(job.salary_min, job.salary_max)}</span>
              </div>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="removeBookmark(${job.id}, this)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('bookmarksList').innerHTML =
        '<div class="alert alert-danger">Failed to load bookmarks.</div>';
    }
  }

  async function removeBookmark(jobId, btn) {
    try {
      await api.removeBookmark(jobId);
      btn.closest('.job-card').remove();
      showToast('Bookmark removed', 'info');
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  function showTab(tab, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('d-none'));
    document.getElementById(`tab-${tab}`).classList.remove('d-none');
    document.querySelectorAll('#profileTabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('profileAlert');
    try {
      await api.updateProfile({
        name: document.getElementById('editName').value,
        bio: document.getElementById('editBio').value,
        skills: document.getElementById('editSkills').value,
        resume_url: document.getElementById('editResume').value,
      });
      alertEl.className = 'alert alert-success';
      alertEl.textContent = '✅ Profile updated successfully!';
      alertEl.classList.remove('d-none');
      loadProfile();
      setTimeout(() => alertEl.classList.add('d-none'), 3000);
    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.message;
      alertEl.classList.remove('d-none');
    }
  });

  loadProfile();
  loadApplications();
  loadBookmarks();
</script>
</body>
</html>
